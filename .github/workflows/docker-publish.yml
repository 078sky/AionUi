name: Build & Push Docker Image

# Builds server-mode Docker image for K3s homelab deployment (linux/arm64).
# Triggers on push to main or manual dispatch. Pushes to GHCR.

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - src/**
      - package.json
      - bun.lock
      - scripts/build-server.mjs
      - .github/workflows/docker-publish.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/aionui

jobs:
  build:
    name: Build linux/arm64
    # Native ARM64 build on self-hosted runner (node3, Turing Pi cluster)
    # Much faster than QEMU emulation on GitHub-hosted runners
    runs-on: [self-hosted, linux, arm64]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
