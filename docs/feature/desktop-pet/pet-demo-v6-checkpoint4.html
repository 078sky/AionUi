<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AionUi Pet — animated v6</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a1b2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 32px;
    font-family: system-ui, sans-serif;
    color: #fff;
  }
  h1 { font-size: 12px; opacity: 0.4; letter-spacing: 3px; text-transform: uppercase; }
  .row { display: flex; gap: 56px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item span { font-size: 11px; opacity: 0.4; letter-spacing: 2px; text-transform: uppercase; }
  .pet { width: 200px; height: 200px; transition: width 0.1s, height 0.1s; }
</style>
</head>
<body>

<h1>AionUi Pet · animated v6</h1>

<div style="display:flex;align-items:center;gap:12px;opacity:0.6;font-size:11px;letter-spacing:2px;text-transform:uppercase;">
  <span>小</span>
  <input type="range" min="60" max="400" value="200" step="10" id="sizeSlider"
    style="width:180px;accent-color:#D95226;"
    oninput="document.querySelectorAll('.pet').forEach(el=>{el.style.width=this.value+'px';el.style.height=this.value+'px'});document.getElementById('sizeLabel').textContent=this.value+'px'"/>
  <span>大</span>
  <span id="sizeLabel" style="min-width:40px;">200px</span>
</div>

<div class="row">

  <!-- ═══════════════════════════════════════════════
       IDLE — breathe + blink + subtle sway
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .idle-body {
            transform-origin: 11px 18px;
            animation: idle-breathe 3.2s ease-in-out infinite, idle-sway 6s ease-in-out infinite;
          }
          .idle-eye {
            transform-origin: 11px 11px;
            animation: idle-blink 4s ease-in-out infinite;
          }
          .idle-shadow {
            transform-origin: 11px 22.5px;
            animation: idle-shadow-pulse 3.2s ease-in-out infinite;
          }
          @keyframes idle-breathe {
            0%,100% { transform: scaleY(1) translateY(0); }
            50%     { transform: scaleY(0.97) translateY(0.3px); }
          }
          @keyframes idle-sway {
            0%,100% { transform: rotate(0deg); }
            25%     { transform: rotate(1.2deg); }
            75%     { transform: rotate(-1.2deg); }
          }
          @keyframes idle-blink {
            0%,8%,100% { transform: scaleY(1); }
            4%          { transform: scaleY(0.08); }
          }
          @keyframes idle-shadow-pulse {
            0%,100% { transform: scaleX(1); opacity: 0.35; }
            50%     { transform: scaleX(0.96); opacity: 0.28; }
          }
        </style>
      </defs>
      <!-- shadow -->
      <ellipse class="idle-shadow" cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0"/>
      <!-- main body group -->
      <g class="idle-body">
        <!-- arms — relaxed diamonds -->
        <rect x="2" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7" transform="rotate(45 3.5 10.5)"/>
        <rect x="17" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7" transform="rotate(45 18.5 10.5)"/>
        <!-- body -->
        <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
        <!-- hat -->
        <polygon points="11,1 15,7 7,7" fill="#FF6B35" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" stroke-linejoin="round"/>
        <!-- hat highlight -->
        <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
        <!-- eye -->
        <g class="idle-eye">
          <rect x="10" y="10" width="2" height="2" fill="#111827"/>
        </g>
        <!-- smile -->
        <path d="M8 13.5 Q11 16.5 14 13.5" stroke="#111827" stroke-width="1" stroke-linecap="round" fill="none"/>
      </g>
    </svg>
    <span>idle</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       THINKING — 直接用设计稿坐标，scale适配
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .think-body {
            transform-origin: 11px 12px;
            animation: think-breathe 3.2s ease-in-out infinite;
          }
          .think-bubble { animation: think-bubble-float 3s ease-in-out infinite; }
          .tpx1 { animation: think-dot 1.8s infinite 0s; }
          .tpx2 { animation: think-dot 1.8s infinite 0.35s; }
          .tpx3 { animation: think-dot 1.8s infinite 0.7s; }
          .tgl1 { animation: think-glow 2.5s ease-out infinite 0s;   opacity:0; }
          .tgl2 { animation: think-glow 2.5s ease-out infinite 0.8s; opacity:0; }
          .tgl3 { animation: think-glow 2.5s ease-out infinite 1.6s; opacity:0; }
          @keyframes think-breathe {
            0%,100% { transform: translateY(0); }
            50%     { transform: translateY(0.5px); }
          }
          @keyframes think-bubble-float {
            0%,100% { transform: translateY(0); }
            50%     { transform: translateY(-0.6px); }
          }
          @keyframes think-dot {
            0%,10%  { opacity:0; transform:scale(0.5); }
            35%,70% { opacity:1; transform:scale(1); }
            100%    { opacity:0; transform:scale(0.5); }
          }
          @keyframes think-glow {
            0%   { opacity:0;   transform:translate(0,0)    scale(1); }
            25%  { opacity:0.9; transform:translate(0.5px,-1px) scale(1); }
            100% { opacity:0;   transform:translate(2px,-7px)  scale(1.4); }
          }
        </style>
      </defs>

      <!-- 完全使用设计稿原始坐标，不做任何偏移 -->

      <!-- 飘动光点动画 -->
      <rect class="tgl1" x="21" y="12" width="1.5" height="1.5" rx="0.3" fill="#94BDFF"/>
      <rect class="tgl2" x="20" y="8"  width="1.2" height="1.2" rx="0.2" fill="#94BDFF"/>
      <rect class="tgl3" x="5"  y="12" width="1.2" height="1.2" rx="0.2" fill="#94BDFF"/>

      <!-- shadow — 统一样式 -->
      <ellipse cx="14" cy="26.5" rx="4" ry="0.6" fill="#c0c0c0" opacity="0.35"/>
      <!-- 去掉设计稿里的 D9D9D9 阴影条 -->

      <g class="think-body">
        <!-- 左手：设计稿原始 ellipse path -->
        <path d="M8.9418 18.0631C8.35737 17.476 7.40762 17.4738 6.82048 18.0582C6.23334 18.6426 6.23115 19.5924 6.81558 20.1795C7.40001 20.7667 8.34975 20.7689 8.93689 20.1844C9.52403 19.6 9.52623 18.6502 8.9418 18.0631Z" fill="#97A0C5" fill-opacity="0.7"/>
        <!-- 身体：设计稿原始 rect -->
        <rect width="12" height="12" rx="6" transform="matrix(-1 0 0 1 20 11)" fill="#97A0C5"/>
        <!-- 右手：设计稿原始 rect -->
        <rect width="3" height="3" rx="1.5" transform="matrix(4.37114e-08 1 1 -4.37114e-08 18 19)" fill="#B6BDD6"/>
        <!-- 帽子：设计稿原始三角 -->
        <path d="M13.0713 11.6884L18.9585 14.2193L18.2068 7.85522L13.0713 11.6884Z" fill="#FF6B35" stroke="rgba(255,255,255,0.4)" stroke-width="0.4" stroke-linejoin="round"/>
        <!-- 白色眼睛块 -->
        <rect x="8" y="8" width="2" height="3" fill="white"/>
        <!-- 嘟嘴圆点 -->
        <rect x="13" y="15" width="2" height="2" rx="1" fill="black"/>
        <!-- 嘴弧 -->
        <path d="M13 18.5C12.1198 18.72 11.8162 19.8162 12.4577 20.4577L12.5 20.5" stroke="black" stroke-linecap="round"/>
      </g>

      <!-- 像素泡泡：设计稿原始 path，完全不改坐标 -->
      <g class="think-bubble">
        <path d="M12.083 2.91602H13V8.41602H12.083V9.33301H2.91699V8.41602H2V2.91602H2.91699V2H12.083V2.91602Z" fill="white"/>
        <rect class="tpx1" x="4" y="5.33301" width="1" height="1" fill="#605AFF"/>
        <rect class="tpx2" x="7" y="5.33301" width="1" height="1" fill="#605AFF"/>
        <rect class="tpx3" x="10" y="5.33301" width="1" height="1" fill="#605AFF"/>
      </g>
    </svg>
    <span>thinking</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       WORKING — 正面角色 + 右侧笔记本敲键盘
       完全还原用户设计稿 working.svg
       原始 viewBox 0 0 24 23，统一缩放至 -18 -18 58 58
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .wk-all {
            transform-origin: 12px 15px;
            animation: wk-bob 0.6s cubic-bezier(0.36,0.07,0.19,0.97) infinite;
          }
          .wk-hand-r {
            transform-origin: 14px 22px;
            animation: wk-tap-r 0.3s ease-in-out infinite alternate;
          }
          .wk-hand-l {
            transform-origin: 7px 22px;
            animation: wk-tap-l 0.3s ease-in-out infinite alternate;
          }
          .wk-shadow {
            transform-origin: 10px 23.5px;
            animation: wk-shadow 2.4s ease-in-out infinite;
          }
          .wk-hat {
            transform-origin: 15px 8px;
            animation: wk-hat-shake 0.3s ease-in-out infinite alternate;
          }
          .wk-dot1 { animation: wk-dot-flash 0.9s ease-in-out infinite; animation-delay: 0s; }
          .wk-dot2 { animation: wk-dot-flash 0.9s ease-in-out infinite; animation-delay: 0.3s; }
          .wk-dot3 { animation: wk-dot-flash 0.9s ease-in-out infinite; animation-delay: 0.6s; }
          .wk-dot4 { animation: wk-dot-flash 0.9s ease-in-out infinite; animation-delay: 0.15s; }
          @keyframes wk-bob {
            0%,100% { transform: translateY(0) scaleY(1); }
            30%     { transform: translateY(-2px) scaleY(1.04); }
            60%     { transform: translateY(1px) scaleY(0.97); }
          }
          @keyframes wk-tap-r {
            from { transform: translateY(0); }
            to   { transform: translateY(-3px); }
          }
          @keyframes wk-tap-l {
            from { transform: translateY(-3px); }
            to   { transform: translateY(0); }
          }
          @keyframes wk-shadow {
            0%,100% { transform: scaleX(1); opacity: 0.32; }
            50%     { transform: scaleX(0.9); opacity: 0.2; }
          }
          @keyframes wk-hat-shake {
            from { transform: rotate(-6deg) translateY(0); }
            to   { transform: rotate(4deg) translateY(-0.5px); }
          }
          @keyframes wk-dot-flash {
            0%,100% { opacity: 1; transform: scale(1); }
            50%     { opacity: 0.1; transform: scale(0.6); }
          }
        </style>
      </defs>

      <!-- 阴影 -->
      <ellipse class="wk-shadow" cx="10" cy="23.5" rx="7" ry="0.75" fill="#c0c0c0"/>

      <g class="wk-all">
        <!-- ── 绿色装饰光点（最底层，身体后面） ── -->
        <rect class="wk-dot1" x="4"  y="9"  width="1.2" height="1.2" rx="0.3" fill="#4AFF3D"/>
        <rect class="wk-dot2" x="21" y="4"  width="1.2" height="1.2" rx="0.3" fill="#4AFF3D"/>
        <rect class="wk-dot3" x="21" y="11" width="1.2" height="1.2" rx="0.3" fill="#4AFF3D"/>
        <rect class="wk-dot4" x="22" y="15" width="1.2" height="1.2" rx="0.3" fill="#4AFF3D"/>
        <rect class="wk-dot2" x="7"  y="5"  width="1"   height="1"   rx="0.2" fill="#4AFF3D"/>

        <!-- ── 角色身体（先画，笔记本后画覆盖下半身） ── -->
        <!-- 身体 -->
        <rect x="8" y="7" width="12" height="12" rx="6" fill="#97A0C5"/>
        <!-- 帽子（随打字抖动） -->
        <g class="wk-hat">
          <path d="M16.4681 2.77162L18.7097 9.32717L11.9116 7.99068L16.4681 2.77162Z" fill="#FF6B35" stroke="rgba(255,255,255,0.35)" stroke-width="0.4"/>
        </g>
        <!-- 眼睛 -->
        <rect x="12" y="11" width="2" height="2" rx="1" fill="#111827"/>

        <!-- ── 笔记本覆盖在身体下半部分上层 ── -->
        <!-- 屏幕面板 -->
        <rect x="3.5" y="15.5" width="10" height="6" rx="0.4" fill="#D9D9D9" stroke="#E5E7F0" stroke-width="0.5"/>
        <!-- 屏幕代码行 -->
        <rect x="4.5" y="17"   width="4" height="0.7" rx="0.25" fill="#9098b8" opacity="0.7"/>
        <rect x="4.5" y="18.5" width="6" height="0.7" rx="0.25" fill="#9098b8" opacity="0.5"/>
        <rect x="4.5" y="20"   width="3" height="0.7" rx="0.25" fill="#9098b8" opacity="0.6"/>
        <!-- 白色底条 -->
        <rect x="10" y="21" width="8" height="1" rx="0.2" fill="white"/>
        <!-- 键盘底座 -->
        <rect x="3" y="22" width="15" height="1" rx="0.3" fill="#D9D9D9"/>
        <!-- 触控板 -->
        <rect x="8" y="22.1" width="1" height="0.7" rx="0.2" fill="#736B6B" opacity="0.7"/>

        <!-- ── 两手在键盘上（笔记本上层，交替弹跳） ── -->
        <g class="wk-hand-l">
          <circle cx="7" cy="22" r="1.6" fill="#97A0C5" fill-opacity="0.9"/>
        </g>
        <g class="wk-hand-r">
          <circle cx="14" cy="22" r="1.6" fill="#B9C3EB"/>
        </g>
      </g>
    </svg>
    <span>working</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       HAPPY — big jump + ^^ eyes + blush + sparkles
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .happy-body {
            transform-origin: 11px 18px;
            animation: happy-jump 1s ease-in-out infinite;
          }
          .happy-shadow {
            transform-origin: 11px 22.5px;
            animation: happy-shadow 1s ease-in-out infinite;
          }
          .happy-arm-l {
            transform-origin: 3.5px 10.5px;
            animation: happy-arm-l 0.5s ease-in-out infinite alternate;
          }
          .happy-arm-r {
            transform-origin: 18.5px 10.5px;
            animation: happy-arm-r 0.5s ease-in-out infinite alternate;
          }
          .happy-spark { opacity: 0; }
          .happy-sp1 { animation: happy-spark-flash 1.5s step-end infinite; animation-delay: 0s; }
          .happy-sp2 { animation: happy-spark-flash 1.5s step-end infinite; animation-delay: 0.5s; }
          .happy-sp3 { animation: happy-spark-flash 1.5s step-end infinite; animation-delay: 1s; }
          .happy-sp4 { animation: happy-spark-flash 1.5s step-end infinite; animation-delay: 0.75s; }
          @keyframes happy-jump {
            0%,100% { transform: translateY(0) scaleY(1); }
            12%     { transform: translateY(0) scaleY(0.86); }
            30%     { transform: translateY(-7px) scaleY(1.07); }
            50%     { transform: translateY(-8px) scaleY(1); }
            70%     { transform: translateY(-7px) scaleY(1.07); }
            88%     { transform: translateY(0) scaleY(0.86); }
          }
          @keyframes happy-shadow {
            0%,100% { transform: scaleX(1); opacity: 0.35; }
            30%,70% { transform: scaleX(0.4); opacity: 0.07; }
          }
          @keyframes happy-arm-l {
            from { transform: rotate(-55deg); }
            to   { transform: rotate(-65deg); }
          }
          @keyframes happy-arm-r {
            from { transform: rotate(55deg); }
            to   { transform: rotate(65deg); }
          }
          @keyframes happy-spark-flash {
            0%  { opacity: 0; }
            10% { opacity: 1; }
            30% { opacity: 0; }
            100%{ opacity: 0; }
          }
        </style>
      </defs>
      <!-- sparkles — pixel cross shapes -->
      <g class="happy-spark happy-sp1" fill="#FFD700">
        <rect x="1" y="4" width="1" height="1"/>
        <rect x="0" y="5" width="3" height="0.5"/>
        <rect x="1" y="6" width="1" height="1"/>
      </g>
      <g class="happy-spark happy-sp2" fill="#FF9F3F">
        <rect x="19" y="2" width="1" height="1"/>
        <rect x="18" y="3" width="3" height="0.5"/>
        <rect x="19" y="4" width="1" height="1"/>
      </g>
      <g class="happy-spark happy-sp3" fill="#FFF59D">
        <rect x="20" y="11" width="1" height="1"/>
        <rect x="19" y="12" width="3" height="0.5"/>
        <rect x="20" y="13" width="1" height="1"/>
      </g>
      <g class="happy-spark happy-sp4" fill="#FFB3C6">
        <rect x="-2" y="10" width="1" height="1"/>
        <rect x="-3" y="11" width="3" height="0.5"/>
        <rect x="-2" y="12" width="1" height="1"/>
      </g>
      <ellipse class="happy-shadow" cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0"/>
      <g class="happy-body">
        <!-- arms both raised high -->
        <g class="happy-arm-l">
          <rect x="2" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.8" transform="rotate(45 3.5 10.5)"/>
        </g>
        <g class="happy-arm-r">
          <rect x="17" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.8" transform="rotate(45 18.5 10.5)"/>
        </g>
        <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
        <polygon points="11,1 15,7 7,7" fill="#FF6B35" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" stroke-linejoin="round"/>
        <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
        <!-- ^^ arc eyes -->
        <path d="M9 10.5 Q10 9.2 11 10.5" stroke="#111827" stroke-width="1.1" stroke-linecap="round" fill="none"/>
        <path d="M11 10.5 Q12 9.2 13 10.5" stroke="#111827" stroke-width="1.1" stroke-linecap="round" fill="none"/>
        <!-- rosy blush cheeks -->
        <ellipse cx="8" cy="12.5" rx="1.2" ry="0.7" fill="#e08090" opacity="0.5"/>
        <ellipse cx="14" cy="12.5" rx="1.2" ry="0.7" fill="#e08090" opacity="0.5"/>
        <!-- wide smile -->
        <path d="M8 13 Q11 17.5 14 13" stroke="#111827" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      </g>
    </svg>
    <span>happy</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       SLEEPING — deep breathe + tilted hat + zzz float
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .sleep-body {
            transform-origin: 11px 18px;
            animation: sleep-breathe 4.5s ease-in-out infinite;
          }
          .sleep-shadow {
            transform-origin: 11px 22.5px;
            animation: sleep-shadow 4.5s ease-in-out infinite;
          }
          .sleep-z1 { animation: sleep-zzz1 5s ease-in-out infinite; animation-delay: 0s; opacity: 0; }
          .sleep-z2 { animation: sleep-zzz2 5s ease-in-out infinite; animation-delay: 1.6s; opacity: 0; }
          .sleep-z3 { animation: sleep-zzz3 5s ease-in-out infinite; animation-delay: 3.2s; opacity: 0; }
          @keyframes sleep-breathe {
            0%,100% { transform: scaleY(1); }
            35%,45% { transform: scaleY(1.04); }
          }
          @keyframes sleep-shadow {
            0%,100% { transform: scaleX(1); opacity: 0.28; }
            35%,45% { transform: scaleX(1.04); opacity: 0.35; }
          }
          @keyframes sleep-zzz1 {
            0%   { opacity:0; transform: translate(12px,6px) scale(0.55); }
            15%  { opacity:0.9; }
            80%  { opacity:0.5; }
            100% { opacity:0; transform: translate(17px,-1px) scale(0.95); }
          }
          @keyframes sleep-zzz2 {
            0%   { opacity:0; transform: translate(14px,4px) scale(0.45); }
            15%  { opacity:0.85; }
            80%  { opacity:0.45; }
            100% { opacity:0; transform: translate(20px,-2px) scale(0.85); }
          }
          @keyframes sleep-zzz3 {
            0%   { opacity:0; transform: translate(10px,8px) scale(0.38); }
            15%  { opacity:0.8; }
            80%  { opacity:0.4; }
            100% { opacity:0; transform: translate(15px,2px) scale(0.75); }
          }
        </style>
        <!-- pixel Z shape -->
        <g id="sleep-pz">
          <rect x="0" y="0" width="3" height="0.7"/>
          <rect x="1.6" y="0.7" width="0.8" height="0.8"/>
          <rect x="0.7" y="1.5" width="0.8" height="0.8"/>
          <rect x="0" y="2.3" width="3" height="0.7"/>
        </g>
      </defs>
      <!-- floating zzz -->
      <use href="#sleep-pz" class="sleep-z1" fill="#8891b8"/>
      <use href="#sleep-pz" class="sleep-z2" fill="#a0a8c8"/>
      <use href="#sleep-pz" class="sleep-z3" fill="#c0c8e0"/>
      <ellipse class="sleep-shadow" cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0"/>
      <g class="sleep-body">
        <!-- arms drooped lower -->
        <rect x="2" y="11" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.5" transform="rotate(45 3.5 12.5)"/>

          transform-origin: 11px 5px;

        .wake-arm-l {

          animation: wake-arm-l 4s ease-in-out infinite;

          transform-origin: 17px 12px;
          animation: wake-arm-r 4s ease-in-out infinite;

          animation: wake-mouth 4s ease-in-out infinite;

        .wake-z3 { animation: wake-z 4s ease-in-out infinite; animation-delay: 0.6s; }

          transform-origin: 11px 23px;
          animation: wake-shadow 4s ease-in-out infinite;
        }

        @keyframes wake-stretch {
          0%,18%  { transform: translateY(4px) scaleY(0.75) scaleX(1.18); }
          40%     { transform: translateY(-6px) scaleY(1.28) scaleX(0.86); }
          55%     { transform: translateY(-10px) scaleY(1.05) scaleX(0.97); }
          68%     { transform: translateY(1px) scaleY(0.93) scaleX(1.06); }
          78%     { transform: translateY(-3px) scaleY(1.04) scaleX(0.98); }
          88%,100%{ transform: translateY(0) scaleY(1) scaleX(1); }
        }
        @keyframes wake-eye {
          0%,20%  { transform: scaleY(0.06); }

          58%     { transform: rotate(-5deg) translateY(-2px); }

        }

          0%,20%  { transform: rotate(35deg) translateY(3px); }
          42%     { transform: rotate(-145deg) translateY(-3px); }
          58%     { transform: rotate(-160deg) translateY(-4px); }
          72%,100%{ transform: rotate(0deg); }
        }
        @keyframes wake-arm-r {
          0%,20%  { transform: rotate(-35deg) translateY(3px); }
          42%     { transform: rotate(145deg) translateY(-3px); }
          58%     { transform: rotate(160deg) translateY(-4px); }
          72%,100%{ transform: rotate(0deg); }
        }
        @keyframes wake-shadow {
          0%,18%  { transform: scaleX(1.22); opacity: 0.4; }
          55%     { transform: scaleX(0.65); opacity: 0.12; }
          68%     { transform: scaleX(1.12); opacity: 0.35; }
          88%,100%{ transform: scaleX(1); opacity: 0.3; }

  <!-- ═══════════════════════════════════════════════
       BUILDING — 拿积木/齿轮在构建，身体上下弹跳
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><style>
        .bd-all {
          transform-origin: 11px 17px;
          animation: bd-bounce 0.55s cubic-bezier(0.36,0.07,0.19,0.97) infinite;
        }
        .bd-gear {
          transform-origin: 19px 8px;
          animation: bd-spin 2s linear infinite;
        }
        .bd-block-l {
          transform-origin: 4px 16px;
          animation: bd-wobble-l 0.55s ease-in-out infinite alternate;
        }
        .bd-block-r {
          transform-origin: 18px 16px;
          animation: bd-wobble-r 0.55s ease-in-out infinite alternate;
        }
        .bd-spark1 { animation: bd-spark 1s ease-out infinite; animation-delay: 0s; }
        .bd-spark2 { animation: bd-spark 1s ease-out infinite; animation-delay: 0.33s; }
        .bd-spark3 { animation: bd-spark 1s ease-out infinite; animation-delay: 0.66s; }
        .bd-shadow {
          transform-origin: 11px 25px;
          animation: bd-shadow 0.55s cubic-bezier(0.36,0.07,0.19,0.97) infinite;
        }
        @keyframes bd-bounce {
          0%,100% { transform: translateY(0) scaleY(1) scaleX(1); }
          30%     { transform: translateY(-3px) scaleY(1.06) scaleX(0.95); }
          60%     { transform: translateY(1.5px) scaleY(0.94) scaleX(1.05); }
        }
        @keyframes bd-spin {
          from { transform: rotate(0deg); }
          to   { transform: rotate(360deg); }
        }
        @keyframes bd-wobble-l {
          from { transform: rotate(-10deg) translateY(0); }
          to   { transform: rotate(5deg) translateY(-2px); }
        }
        @keyframes bd-wobble-r {
          from { transform: rotate(10deg) translateY(-2px); }
          to   { transform: rotate(-5deg) translateY(0); }
        }
        @keyframes bd-spark {
          0%   { transform: translate(0,0) scale(1); opacity: 1; }
          100% { transform: translate(3px,-6px) scale(0.2); opacity: 0; }
        }
        @keyframes bd-shadow {
          0%,100% { transform: scaleX(1); opacity: 0.3; }
          30%     { transform: scaleX(0.8); opacity: 0.15; }
          60%     { transform: scaleX(1.1); opacity: 0.35; }
        }
      </style></defs>

      <ellipse class="bd-shadow" cx="11" cy="25" rx="7" ry="0.75" fill="#c0c0c0"/>

      <g class="bd-all">
        <!-- 齿轮（右上角旋转） -->
        <g class="bd-gear">
          <circle cx="19" cy="8" r="3" fill="none" stroke="#ffc94d" stroke-width="1.2"/>
          <circle cx="19" cy="8" r="1.2" fill="#ffc94d"/>
          <!-- 齿 -->
          <rect x="18.3" y="4.5" width="1.4" height="1.2" rx="0.3" fill="#ffc94d"/>
          <rect x="18.3" y="10.3" width="1.4" height="1.2" rx="0.3" fill="#ffc94d"/>
          <rect x="15.5" y="7.3" width="1.2" height="1.4" rx="0.3" fill="#ffc94d"/>
          <rect x="21.3" y="7.3" width="1.2" height="1.4" rx="0.3" fill="#ffc94d"/>
        </g>

        <!-- 火花 -->
        <rect class="bd-spark1" x="17" y="12" width="1" height="1" rx="0.3" fill="#FFD700"/>
        <rect class="bd-spark2" x="19" y="14" width="0.8" height="0.8" rx="0.2" fill="#FF9500"/>
        <rect class="bd-spark3" x="15" y="13" width="0.7" height="0.7" rx="0.2" fill="#FFD700"/>

        <!-- 左手拿积木 -->
        <g class="bd-block-l">
          <rect x="1" y="13" width="4" height="4" rx="0.8" fill="#7c91e8"/>
          <rect x="2.5" y="11.8" width="1" height="1.5" rx="0.4" fill="#7c91e8"/>
        </g>
        <!-- 右手拿积木 -->
        <g class="bd-block-r">
          <rect x="17" y="13" width="4" height="4" rx="0.8" fill="#e87c7c"/>
          <rect x="18.5" y="11.8" width="1" height="1.5" rx="0.4" fill="#e87c7c"/>
        </g>

        <!-- 身体 -->
        <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
        <!-- 帽子 -->
        <polygon points="11,1 15,7 7,7" fill="#FF6B35" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" stroke-linejoin="round"/>
        <!-- 眼睛（开心眯眼，专注状） -->
        <path d="M9 11 Q11 9.5 13 11" stroke="#111827" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <!-- 嘴巴（咬牙专注） -->
        <path d="M9 14 Q11 16 13 14" stroke="#111827" stroke-width="0.9" stroke-linecap="round" fill="none"/>
      </g>
    </svg>
    <span>building</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       JUGGLING — cascade 三球杂耍
       真实 cascade 轨迹：每球都是抛物线，左右手交替
       手臂配合接抛动作，身体开心晃，大笑脸
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs><style>
        .jg-body {
          transform-origin: 11px 17px;
          animation: jg-lean 0.8s ease-in-out infinite;
        }
        /* 左臂随接/抛节奏上下 */
        .jg-arm-l {
          transform-origin: 5px 14px;
          animation: jg-arm-l 0.8s ease-in-out infinite;
        }
        .jg-arm-r {
          transform-origin: 17px 14px;
          animation: jg-arm-r 0.8s ease-in-out infinite;
        }
        /*
          真正 cascade 轨迹：
          每球周期 = 2.4s（三球错开 0.8s）
          0% 左手低位 → 抛出 → 50% 顶点 → 接落 → 100% 右手低位
          下一周期从右手再抛回左手（mirror）
          为简化用单程抛物，球到右手后瞬间传回左手
        */
        .jg-ba { animation: jg-casc 2.4s ease-in-out infinite; animation-delay: 0s; }
        .jg-bb { animation: jg-casc 2.4s ease-in-out infinite; animation-delay: -0.8s; }
        .jg-bc { animation: jg-casc 2.4s ease-in-out infinite; animation-delay: -1.6s; }
        .jg-shadow {
          transform-origin: 11px 25px;
          animation: jg-shadow 0.8s ease-in-out infinite;
        }
        /*
          cascade 单球轨迹（以左手抛→顶→右手接 为例）:
          x: 3→11→19 (左到右)
          y: 21→-12→21 (抛物线顶点-12)
          scale: 1.15(低)→0.6(顶)→1.15(低) 模拟景深
          右手接到后瞬间跳回左手继续（通过循环实现）
        */
        @keyframes jg-casc {
          0%   { transform: translate(3px, 21px)  scale(1.15); }
          12%  { transform: translate(5px, 8px)   scale(0.95); }
          25%  { transform: translate(8px, -4px)  scale(0.75); }
          50%  { transform: translate(11px,-12px) scale(0.6); }
          75%  { transform: translate(15px,-2px)  scale(0.8); }
          88%  { transform: translate(18px, 12px) scale(1.0); }
          100% { transform: translate(19px, 21px) scale(1.15); }
        }
        /* 身体随节奏左右小幅晃动+弹跳 */
        @keyframes jg-lean {
          0%   { transform: rotate(-5deg) translateY(0) scaleX(1.02); }
          50%  { transform: rotate(5deg)  translateY(-1px) scaleX(0.98); }
          100% { transform: rotate(-5deg) translateY(0) scaleX(1.02); }
        }
        /* 左臂：抛出时（0%）高举，接球时（50%）等待 */
        @keyframes jg-arm-l {
          0%   { transform: rotate(-55deg) translateY(-1px); }
          25%  { transform: rotate(-20deg); }
          50%  { transform: rotate(15deg); }
          75%  { transform: rotate(-10deg); }
          100% { transform: rotate(-55deg) translateY(-1px); }
        }
        /* 右臂：与左臂错半拍 */
        @keyframes jg-arm-r {
          0%   { transform: rotate(15deg); }
          25%  { transform: rotate(-10deg); }
          50%  { transform: rotate(-55deg) translateY(-1px); }
          75%  { transform: rotate(-20deg); }
          100% { transform: rotate(15deg); }
        }
        @keyframes jg-shadow {
          0%,100%{ transform: scaleX(1.05); opacity:0.3; }
          50%    { transform: scaleX(0.9); opacity:0.2; }
        }
      </style></defs>

      <ellipse class="jg-shadow" cx="11" cy="25" rx="7" ry="0.75" fill="#c0c0c0"/>

      <!-- 球：在身体后面渲染，越小越在后（scale模拟高度） -->
      <circle class="jg-ba" cx="0" cy="0" r="2.3" fill="#FF6B35"/>
      <circle class="jg-bb" cx="0" cy="0" r="2.3" fill="#7c91e8"/>

      <g class="jg-body">
        <!-- 左手 -->
        <g class="jg-arm-l">
          <rect x="1.5" y="12" width="4" height="4" rx="2" fill="#8891b8" opacity="0.9"/>
        </g>
        <!-- 右手 -->
        <g class="jg-arm-r">
          <rect x="16.5" y="12" width="4" height="4" rx="2" fill="#8891b8" opacity="0.9"/>
        </g>
        <!-- 身体 -->
        <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
        <!-- 帽子 -->
        <polygon points="11,1 15,7 7,7" fill="#FF6B35" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" stroke-linejoin="round"/>
        <!-- 眼睛：弯弯开心眼（^^ 形状） -->
        <path d="M9 11 Q10 9.2 11 11" stroke="#111827" stroke-width="1.1" stroke-linecap="round" fill="none"/>
        <path d="M11 11 Q12 9.2 13 11" stroke="#111827" stroke-width="1.1" stroke-linecap="round" fill="none"/>
        <!-- 嘴巴：大笑 -->
        <path d="M8 13.5 Q11 17.5 14 13.5" stroke="#111827" stroke-width="1.1" stroke-linecap="round" fill="none"/>
      </g>

      <!-- 第三个球最上层（飞得最高时压过身体） -->
      <circle class="jg-bc" cx="0" cy="0" r="2.3" fill="#4AFF3D"/>
    </svg>
    <span>juggling</span>
  </div>

</div>

</body>
