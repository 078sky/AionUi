<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AionUi Pet Demo v1 — original</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1b2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    color: #fff;
    gap: 32px;
  }

  h1 { font-size: 18px; opacity: 0.6; letter-spacing: 2px; }

  .pet-stage {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .pet-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .pet-item span {
    font-size: 12px;
    opacity: 0.5;
    letter-spacing: 1px;
  }

  /* ── Color variables (AionUi brand) ── */
  svg.aion-pet {
    --body-color: #7583b2;
    --body-dark: #5a6899;
    --body-light: #9aa3c8;
    --eye-color: #1a1b2e;
    --shadow-color: #3d4466;
    --accent: #165dff;
    --bubble-bg: #ffffff;
    --bubble-dot: #165dff;
  }

  /* ── IDLE: breathe + blink ── */
  .idle-breathe {
    transform-origin: 7.5px 13px;
    animation: breathe 3.2s infinite ease-in-out;
  }
  .idle-blink {
    transform-origin: 7.5px 9px;
    animation: eye-blink 4s infinite ease-in-out;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1, 1) translate(0, 0); }
    50%      { transform: scale(1.02, 0.98) translate(0, 0.5px); }
  }
  @keyframes eye-blink {
    0%, 10%, 100% { transform: scaleY(1); }
    5%            { transform: scaleY(0.1); }
  }

  /* ── THINKING: body lean + bubble dots ── */
  .think-body {
    transform-origin: 7.5px 15px;
    animation: body-think 12s infinite ease-in-out;
  }
  .think-breathe {
    transform-origin: 7.5px 13px;
    animation: breathe 3.2s infinite ease-in-out;
  }
  .think-eyes {
    transform-origin: 7.5px 8px;
    animation: eyes-think 12s infinite ease-in-out;
  }
  .think-arm-r { transform-origin: 14px 10px; animation: arm-r-think 12s infinite ease-in-out; }
  .think-arm-l { transform-origin: 1px 10px;  animation: arm-l-think 12s infinite ease-in-out; }
  .dot { opacity: 0; }
  .d1  { animation: load-dot 2s 0s   infinite; }
  .d2  { animation: load-dot 2s 0.4s infinite; }
  .d3  { animation: load-dot 2s 0.8s infinite; }

  @keyframes body-think {
    0%, 35%, 80%, 100% { transform: rotate(0deg) translate(0,0); }
    50%                { transform: rotate(1.5deg) translate(0.3px,0); }
  }
  @keyframes eyes-think {
    0%,  14% { transform: translate(0.5px, -0.3px) scaleY(1); }
    16%      { transform: translate(0.5px, -0.3px) scaleY(0.1); }
    18%,  42%{ transform: translate(0.5px, -0.3px) scaleY(1); }
    44%      { transform: translate(0.5px, -0.3px) scaleY(0.1); }
    46%, 56% { transform: translate(0.5px, -0.3px) scaleY(1); }
    70%      { transform: translate(-0.5px, 0) scaleY(1); }
    76%      { transform: translate(-0.5px, 0) scaleY(0.1); }
    78%      { transform: translate(-0.5px, 0) scaleY(1); }
    88%, 100%{ transform: translate(0.5px, -0.3px) scaleY(1); }
  }
  @keyframes arm-r-think {
    0%, 38%, 75%, 100% { transform: rotate(-130deg); }
    52%                { transform: rotate(-138deg); }
    62%                { transform: rotate(-127deg); }
  }
  @keyframes arm-l-think {
    0%, 40%, 78%, 100% { transform: rotate(22deg); }
    55%                { transform: rotate(26deg); }
  }
  @keyframes load-dot {
    0%, 20%   { opacity: 0; transform: translateY(0); }
    50%       { opacity: 1; transform: translateY(-1px); }
    80%, 100% { opacity: 0; transform: translateY(0); }
  }

  /* ── WORKING / TYPING: fast bounce ── */
  .work-body {
    transform-origin: 7.5px 13px;
    animation: work-bounce 0.5s infinite ease-in-out;
  }
  .work-arm-l { transform-origin: 1px 10px;  animation: work-arm-l 0.5s infinite ease-in-out; }
  .work-arm-r { transform-origin: 14px 10px; animation: work-arm-r 0.5s 0.25s infinite ease-in-out; }

  @keyframes work-bounce {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-1.5px); }
  }
  @keyframes work-arm-l {
    0%, 100% { transform: rotate(0deg); }
    50%      { transform: rotate(-15deg); }
  }
  @keyframes work-arm-r {
    0%, 100% { transform: rotate(0deg); }
    50%      { transform: rotate(15deg); }
  }

  /* ── HAPPY: jump ── */
  .happy-body {
    transform-origin: 7.5px 15px;
    animation: happy-jump 0.6s 3 ease-in-out, breathe 3.2s 1.8s infinite ease-in-out;
  }
  @keyframes happy-jump {
    0%, 100% { transform: translateY(0) scale(1,1); }
    30%      { transform: translateY(-5px) scale(0.98, 1.03); }
    70%      { transform: translateY(1px) scale(1.02, 0.97); }
  }

  /* ── SLEEPING: slow breathe, zzz ── */
  .sleep-body {
    transform-origin: 7.5px 13px;
    animation: sleep-breathe 5s infinite ease-in-out;
  }
  .z1  { animation: zzz-float 3s 0s    infinite ease-in-out; }
  .z2  { animation: zzz-float 3s 0.8s  infinite ease-in-out; }
  .z3  { animation: zzz-float 3s 1.6s  infinite ease-in-out; }

  @keyframes sleep-breathe {
    0%, 100% { transform: scale(1,1); }
    50%      { transform: scale(1.01, 0.99) translate(0, 0.3px); }
  }
  @keyframes zzz-float {
    0%   { opacity: 0; transform: translate(0, 0) scale(0.6); }
    30%  { opacity: 1; }
    100% { opacity: 0; transform: translate(4px, -8px) scale(1); }
  }

  /* ── ERROR: shake ── */
  .error-body {
    animation: error-shake 0.4s 3 ease-in-out;
  }
  @keyframes error-shake {
    0%, 100% { transform: translateX(0); }
    20%      { transform: translateX(-2px); }
    60%      { transform: translateX(2px); }
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    padding: 8px 18px;
    border: 1px solid #7583b2;
    border-radius: 6px;
    background: transparent;
    color: #a1aacb;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }
  button:hover { background: #7583b222; color: #fff; }
  button.active { background: #7583b2; color: #fff; }

  .live-demo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .live-demo .pet-wrap {
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #live-state-label {
    font-size: 13px;
    color: #7583b2;
    letter-spacing: 1px;
  }
</style>
</head>

      <rect x="9" y="11" width="1" height="4"/><rect x="11" y="11" width="1" height="4"/>
    </g>
    <g class="error-body">
      <rect x="2" y="6" width="11" height="7" fill="#c06060"/>
      <rect x="0" y="9" width="2" height="2" fill="#c06060"/>
      <rect x="13" y="9" width="2" height="2" fill="#c06060"/>
      <line x1="4" y1="7.5" x2="5.5" y2="9" stroke="var(--eye-color)" stroke-width="0.8"/>
      <line x1="5.5" y1="7.5" x2="4" y2="9" stroke="var(--eye-color)" stroke-width="0.8"/>
      <line x1="10" y1="7.5" x2="11.5" y2="9" stroke="var(--eye-color)" stroke-width="0.8"/>
      <line x1="11.5" y1="7.5" x2="10" y2="9" stroke="var(--eye-color)" stroke-width="0.8"/>
    </g>
  </svg>`
};

function setLiveState(state) {
  document.getElementById('live-pet-wrap').innerHTML = SVGS[state];
  document.getElementById('live-state-label').textContent = `— ${state} —`;
  document.querySelectorAll('.controls button').forEach(b => {
    b.classList.toggle('active', b.textContent === state);
  });
}
setLiveState('idle');
const states = ['idle','thinking','working','happy','sleeping','error'];
let idx = 0;
setInterval(() => { idx = (idx+1) % states.length; setLiveState(states[idx]); }, 3000);
</script>
