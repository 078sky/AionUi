<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AionUi Pet — Interactive Demo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a1b2e;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    color: #fff;
    overflow: hidden;
    cursor: default;
  }
  /* 状态日志 */
  #log {
    position: fixed; top: 16px; left: 16px;
    font-size: 11px; opacity: 0.5; letter-spacing: 1px;
    max-height: 50vh; overflow-y: auto; line-height: 1.6;
    pointer-events: none; z-index: 10;
  }
  #log .entry { opacity: 0.7; }
  #log .entry:last-child { opacity: 1; }
  /* 操作说明 */
  #help {
    position: fixed; bottom: 16px; left: 16px;
    font-size: 11px; opacity: 0.35; letter-spacing: 1px; line-height: 1.8;
    pointer-events: none;
  }
  /* 模拟按钮 */
  #buttons {
    position: fixed; top: 16px; right: 16px;
    display: flex; flex-direction: column; gap: 6px; z-index: 10;
  }
  #buttons button {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer;
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    transition: background 0.15s;
  }
  #buttons button:hover { background: rgba(255,255,255,0.18); }
  /* 宠物容器 */
  #pet {
    position: fixed;
    width: 320px; height: 320px;
    cursor: grab;
    z-index: 100;
    transition: transform 0.15s ease-out;
    user-select: none;
  }
  #pet.dragging { cursor: grabbing; transition: none; }
  #pet svg { width: 100%; height: 100%; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.15)); }
  /* 状态标签 */
  #state-label {
    position: fixed;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    opacity: 0.4; text-align: center; pointer-events: none;
    z-index: 101;
  }
</style>
</head>
<body>

<div id="log"></div>

<div id="help">
  拖拽 → 移动宠物（>< 挤眼挣扎）<br>
  单击 → 开心跳跃<br>
  双击 → 方向偏头（左/右）<br>
  连续3+ → 恼怒抖动<br>
  20s不动 → 打哈欠 → 打盹 → 睡觉<br>
  移动鼠标 → 伸懒腰唤醒<br>
  右侧按钮 → 模拟 20 种状态<br><br>
  <span style="opacity:0.6">底部色条可拖宠物过去测试可见性</span>
</div>

<div id="buttons">
  <button onclick="forceState('idle')">😐 idle</button>
  <button onclick="forceState('thinking')">🧠 thinking</button>
  <button onclick="forceState('working')">💻 working</button>
  <button onclick="forceState('happy')">😊 happy</button>
  <button onclick="forceState('attention')">👏 attention</button>
  <button onclick="forceState('error')">❌ error</button>
  <button onclick="forceState('notification')">❗ notification</button>
  <button onclick="forceState('sleeping')">😴 sleeping</button>
  <button onclick="forceState('waking')">☀️ waking</button>
  <button onclick="forceState('yawning')">🥱 yawning</button>
  <button onclick="forceState('dozing')">😪 dozing</button>
  <button onclick="forceState('sweeping')">🧹 sweeping</button>
  <button onclick="forceState('building')">🔧 building</button>
  <button onclick="forceState('juggling')">🤹 juggling</button>
  <button onclick="forceState('carrying')">📦 carrying</button>
  <button onclick="forceState('dragging')">✊ dragging</button>
  <button onclick="forceState('poke-left')">👈 poke-left</button>
  <button onclick="forceState('poke-right')">👉 poke-right</button>
  <button onclick="forceState('random-look')">👀 look</button>
  <button onclick="forceState('random-read')">📖 read</button>
</div>

<!-- 多色背景条：拖宠物过去测试可见性 -->
<div id="bg-strips" style="position:fixed;bottom:0;left:0;right:0;height:50vh;display:flex;z-index:0;pointer-events:none;">
  <div style="flex:1;background:#ffffff"></div>
  <div style="flex:1;background:#f5f5f5"></div>
  <div style="flex:1;background:#e0e0e0"></div>
  <div style="flex:1;background:#a0a0a0"></div>
  <div style="flex:1;background:#505050"></div>
  <div style="flex:1;background:#1a1b2e"></div>
  <div style="flex:1;background:#000000"></div>
</div>
<div id="bg-label" style="position:fixed;bottom:0;left:0;right:0;text-align:center;font-size:10px;opacity:0.3;letter-spacing:1px;z-index:1;padding:4px;pointer-events:none;">
  白 · 浅灰 · 灰 · 中灰 · 深灰 · 深蓝 · 黑 — 拖宠物到各色区域测试可见性
</div>

<div id="pet"></div>
<div id="state-label"></div>

// ═══════════════════════════════════════════════════════════
// STATE MACHINE — 优先级 + 最短显示时间 + 自动回 idle
// ═══════════════════════════════════════════════════════════
const PRIORITY = {
  dragging: 10, error: 8, notification: 7, sweeping: 6, happy: 5, attention: 5,
  carrying: 4, juggling: 4, building: 4, working: 3, thinking: 2,
  waking: 2, 'poke-left': 2, 'poke-right': 2,
  'random-look': 1, 'random-read': 1, idle: 1,
  yawning: 0, dozing: 0, sleeping: 0,
};
const MIN_DISPLAY = {
  happy: 4000, error: 5000, notification: 3000, sweeping: 5500, attention: 3000,
  building: 4000, juggling: 4000, carrying: 3000, waking: 1500, working: 1000, thinking: 1000,
  'poke-left': 2500, 'poke-right': 2500, yawning: 3500,
  'random-look': 4000, 'random-read': 6000,
};
const AUTO_RETURN = {
  happy: 4000, error: 5000, notification: 3500, sweeping: 5500, attention: 3000,
  building: 5000, juggling: 5000, carrying: 4000, waking: 1500,
  'poke-left': 2500, 'poke-right': 2500,
  'random-look': 6000, 'random-read': 8000,
  yawning: 3500,
};

let currentState = 'idle';
let stateChangedAt = Date.now();
let pendingState = null;
let pendingTimer = null;
let autoReturnTimer = null;

const petEl = document.getElementById('pet');
const labelEl = document.getElementById('state-label');
const logEl = document.getElementById('log');

function log(msg) {
  const entry = document.createElement('div');
  entry.className = 'entry';
  const t = new Date().toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  entry.textContent = `${t}  ${msg}`;
  logEl.appendChild(entry);
  if (logEl.children.length > 30) logEl.firstChild.remove();
  logEl.scrollTop = logEl.scrollHeight;
}

function applyState(state) {
  currentState = state;
  stateChangedAt = Date.now();
  petEl.innerHTML = SVGS[state] || SVGS.idle;
  labelEl.textContent = state;
  const r = petEl.getBoundingClientRect();
  labelEl.style.left = r.left + 'px';
  labelEl.style.top = (r.bottom + 4) + 'px';
  labelEl.style.width = r.width + 'px';

  // Auto-return to idle
  if (autoReturnTimer) clearTimeout(autoReturnTimer);
  const ar = AUTO_RETURN[state];
  if (ar) {
    autoReturnTimer = setTimeout(() => {
      log(`${state} → idle (auto)`);
      applyState('idle');
    }, ar);
  }
}

function setState(newState) {
  if (dndMode && newState !== 'idle' && newState !== 'dragging') return;
  const newPri = PRIORITY[newState] ?? 1;
  const curPri = PRIORITY[currentState] ?? 1;

  // 低优先级不打断高优先级
  if (newPri < curPri) {
    log(`⏳ ${newState} queued (${currentState} has higher priority)`);
    return;
  }

  // 检查最短显示时间
  const minMs = MIN_DISPLAY[currentState] || 0;
  const elapsed = Date.now() - stateChangedAt;
  const remaining = minMs - elapsed;

  if (remaining > 0 && newPri <= curPri) {
    if (pendingTimer) clearTimeout(pendingTimer);
    pendingState = newState;
    pendingTimer = setTimeout(() => {
      log(`⏩ ${pendingState} (queued, now playing)`);
      applyState(pendingState);
      pendingState = null;
      pendingTimer = null;
    }, remaining);
    log(`⏳ ${newState} queued (${remaining}ms remaining)`);
    return;
  }

  log(`▶ ${newState}`);
  if (pendingTimer) { clearTimeout(pendingTimer); pendingTimer = null; }
  applyState(newState);
}

function triggerState(s) { setState(s); }

// 按钮专用：强制切换，无视优先级和最短显示时间
function forceState(s) {
  if (pendingTimer) { clearTimeout(pendingTimer); pendingTimer = null; }
  if (autoReturnTimer) { clearTimeout(autoReturnTimer); autoReturnTimer = null; }
  sleepPhase = 'awake';
  randomIdlePlayed = false;
  log(`⚡ force → ${s}`);
  applyState(s);
}

// ═══════════════════════════════════════════════════════════
// DRAG — 拖拽宠物
// ═══════════════════════════════════════════════════════════
let isDragging = false;
let dragStartX, dragStartY, petStartX, petStartY;
let didDrag = false;

// 初始位置：右下角
let petX = window.innerWidth - 400;
let petY = window.innerHeight - 400;
petEl.style.left = petX + 'px';
petEl.style.top = petY + 'px';

petEl.addEventListener('pointerdown', (e) => {
  if (e.button !== 0) return;
  isDragging = true;
  didDrag = false;
  petEl.setPointerCapture(e.pointerId);
  petEl.classList.add('dragging');
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  petStartX = petX;
  petStartY = petY;
});

document.addEventListener('pointermove', (e) => {
  // 更新鼠标活动时间（用于睡眠检测）
  lastMouseMove = Date.now();

  if (!isDragging) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
    if (!didDrag) { didDrag = true; applyState('dragging'); }
  }
  petX = petStartX + dx;
  petY = petStartY + dy;
  petEl.style.left = petX + 'px';
  petEl.style.top = petY + 'px';
  // 更新标签位置
  labelEl.style.left = petX + 'px';
  labelEl.style.top = (petY + 124) + 'px';
});

document.addEventListener('pointerup', () => {
  if (!isDragging) return;
  isDragging = false;
  petEl.classList.remove('dragging');
  if (didDrag && currentState === 'dragging') {
    log('📍 dropped');
    applyState('idle');
  }
});

// ═══════════════════════════════════════════════════════════
// CLICK — 单击开心，连点恼怒
// ═══════════════════════════════════════════════════════════
let clickCount = 0;
let clickTimer = null;
const CLICK_WINDOW = 500;

petEl.addEventListener('click', (e) => {
  if (didDrag) return;

  clickCount++;
  if (clickTimer) clearTimeout(clickTimer);

  // 记录点击在宠物左半还是右半
  const rect = petEl.getBoundingClientRect();
  const clickSide = (e.clientX - rect.left) < rect.width / 2 ? 'left' : 'right';

  clickTimer = setTimeout(() => {
    if (clickCount >= 3) {
      log('🤯 annoyed! (multi-click)');
      setState('error');
    } else if (clickCount === 2) {
      const pokeState = clickSide === 'left' ? 'poke-left' : 'poke-right';
      log(`👉 poked ${clickSide}! (double-click)`);
      setState(pokeState);
    } else {
      log('👏 poked! (click)');
      setState('attention');
    }
    clickCount = 0;
    clickTimer = null;
  }, CLICK_WINDOW);
});

function petPat() {
  menuEl.style.display = 'none';
  log('🤗 被摸了！开心~');
  setState('attention');
  // 小弹跳
  petEl.style.transition = 'transform 0.15s ease-out';
  petEl.style.transform = 'scale(1.08)';
  setTimeout(() => { petEl.style.transform = 'scale(1)'; }, 150);
  setTimeout(() => { petEl.style.transition = ''; }, 300);
  // 飘出小爱心
  spawnHearts();
}

// 像素风爱心 SVG（3x3 方块拼）
const PIXEL_HEART_COLORS = ['#FF6B6B', '#FF8E8E', '#FFB3B3', '#FF5252', '#E84393', '#FD79A8'];
function makePixelHeart(size, color) {
  // 5x5 pixel heart pattern
  return `<svg width="${size}" height="${size}" viewBox="0 0 5 5" fill="none" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
    <rect x="0" y="1" width="1" height="1" fill="${color}"/>
    <rect x="4" y="1" width="1" height="1" fill="${color}"/>
    <rect x="0" y="2" width="1" height="1" fill="${color}"/>
    <rect x="4" y="2" width="1" height="1" fill="${color}"/>
    <rect x="1" y="0" width="1" height="1" fill="${color}"/>
    <rect x="3" y="0" width="1" height="1" fill="${color}"/>
    <rect x="1" y="1" width="1" height="1" fill="${color}"/>
    <rect x="2" y="1" width="1" height="1" fill="${color}"/>
    <rect x="3" y="1" width="1" height="1" fill="${color}"/>
    <rect x="1" y="2" width="1" height="1" fill="${color}"/>
    <rect x="2" y="2" width="1" height="1" fill="${color}"/>
    <rect x="3" y="2" width="1" height="1" fill="${color}"/>
    <rect x="2" y="0" width="1" height="1" fill="${color}"/>
    <rect x="1" y="3" width="1" height="1" fill="${color}"/>
    <rect x="2" y="3" width="1" height="1" fill="${color}"/>
    <rect x="3" y="3" width="1" height="1" fill="${color}"/>
    <rect x="2" y="4" width="1" height="1" fill="${color}"/>
  </svg>`;
}

function spawnHearts() {
  const r = petEl.getBoundingClientRect();
  const cx = r.left + r.width / 2;
  const cy = r.top + r.height * 0.3;
  for (let i = 0; i < 7; i++) {
    const heart = document.createElement('div');
    const size = 12 + Math.random() * 14;
    const color = PIXEL_HEART_COLORS[Math.floor(Math.random() * PIXEL_HEART_COLORS.length)];
    heart.innerHTML = makePixelHeart(size, color);
    heart.style.cssText = `position:fixed;z-index:200;pointer-events:none;
      left:${cx + (Math.random()-0.5)*80}px;top:${cy + (Math.random()-0.5)*20}px;opacity:1;
      transition:all ${1.2 + Math.random()*0.8}s cubic-bezier(0.25,0.46,0.45,0.94);`;
    document.body.appendChild(heart);
    requestAnimationFrame(() => {
      heart.style.transform = `translateY(${-50 - Math.random()*70}px) translateX(${(Math.random()-0.5)*40}px) rotate(${(Math.random()-0.5)*25}deg)`;
      heart.style.opacity = '0';
    });
    setTimeout(() => heart.remove(), 2200);
  }
}

let dndMode = false;
function toggleDND() {
  dndMode = !dndMode;
  log(dndMode ? '🔕 勿扰模式 ON' : '🔔 勿扰模式 OFF');
  menuEl.style.display = 'none';
}

function setPetSize(size) {
  petEl.style.width = size + 'px';
  petEl.style.height = size + 'px';
  log(`📐 size → ${size}px`);
  menuEl.style.display = 'none';
}

petEl.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  menuEl.style.left = e.clientX + 'px';
  menuEl.style.top = e.clientY + 'px';
  menuEl.style.display = 'block';
});
document.addEventListener('click', () => { menuEl.style.display = 'none'; });

// ═══════════════════════════════════════════════════════════
// SLEEP — 对齐 clawd 时间线
//   20s idle → 随机 idle 动画 (random-look/random-read)
//   60s idle → yawning(3s) → dozing
//   10min idle → sleeping (深度睡眠)
//   鼠标移动 → waking(1.5s) → idle
// ═══════════════════════════════════════════════════════════
let lastMouseMove = Date.now();
const RANDOM_IDLE_TIMEOUT = 20000;   // 20s → 随机 idle 动画
const YAWN_TIMEOUT = 60000;          // 60s → 打哈欠
const DEEP_SLEEP_TIMEOUT = 600000;   // 10min → 深度睡眠
let sleepPhase = 'awake'; // awake | random-idle | yawning | dozing | deep
let randomIdlePlayed = false;

setInterval(() => {
  const idle = Date.now() - lastMouseMove;
  const isInteractive = ['working', 'thinking', 'error', 'notification', 'happy',
                          'sweeping', 'building', 'juggling', 'waking', 'attention',
                          'carrying', 'dragging'].includes(currentState);

  if (isInteractive) {
    sleepPhase = 'awake';
    randomIdlePlayed = false;
    return;
  }

  // 20s → 随机 idle 动画
  if (sleepPhase === 'awake' && idle >= RANDOM_IDLE_TIMEOUT && !randomIdlePlayed) {
    randomIdlePlayed = true;
    const pick = Math.random() < 0.5 ? 'random-look' : 'random-read';
    log(`👀 random idle → ${pick} (20s idle)`);
    applyState(pick);
  }

  // 60s → 打哈欠
  if (sleepPhase === 'awake' && idle >= YAWN_TIMEOUT) {
    sleepPhase = 'yawning';
    log('🥱 yawning (60s idle)');
    applyState('yawning');
    setTimeout(() => {
      if (sleepPhase === 'yawning') {
        sleepPhase = 'dozing';
        log('😪 dozing off');
        applyState('dozing');
      }
    }, 3000);
  }

  // 10min → 深度睡眠
  if (sleepPhase === 'dozing' && idle >= DEEP_SLEEP_TIMEOUT) {
    sleepPhase = 'deep';
    log('😴 deep sleep (10min idle)');
    applyState('sleeping');
  }
}, 1000);

// 鼠标移动唤醒
document.addEventListener('mousemove', () => {
  if (sleepPhase !== 'awake' &&
      ['sleeping', 'dozing', 'yawning'].includes(currentState)) {
    sleepPhase = 'awake';
    randomIdlePlayed = false;
    log('☀️ waking up!');
    setState('waking');
  }
  lastMouseMove = Date.now();
});

// ═══════════════════════════════════════════════════════════
// EYE TRACKING — idle 时眼球跟随鼠标
// 眼球偏移最大 3px，身体微倾 33%，0.5px 取整防抖
// ═══════════════════════════════════════════════════════════
let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

let lastEyeDx = 0, lastEyeDy = 0;
function updateEyeTracking() {
  requestAnimationFrame(updateEyeTracking);
  if (currentState !== 'idle') {
    lastEyeDx = 0; lastEyeDy = 0;
    return;
  }

  const pupil = petEl.querySelector('.idle-pupil');
  const track = petEl.querySelector('.idle-track');
  if (!pupil || !track) return;

  const r = petEl.getBoundingClientRect();
  const centerX = r.left + r.width * 0.5;
  const centerY = r.top + r.height * 0.4;

  const relX = mouseX - centerX;
  const relY = mouseY - centerY;
  const dist = Math.sqrt(relX * relX + relY * relY);

  const MAX_X = 3, MAX_UP = 3, MAX_DOWN = 1, RANGE = 300;
  let dx = 0, dy = 0;
  if (dist > 1) {
    const s = Math.min(1, dist / RANGE);
    dx = Math.round((relX / dist) * MAX_X * s * 2) / 2;
    const rawDy = (relY / dist) * MAX_UP * s;
    dy = Math.round(Math.min(MAX_DOWN, Math.max(-MAX_UP, rawDy)) * 2) / 2;
  }

  if (dx !== lastEyeDx || dy !== lastEyeDy) {
    // 眼珠偏移
    pupil.setAttribute('transform', `translate(${dx} ${dy})`);
    // 整个身体（含嘴巴）跟着微倾：位移 33% + 微转头
    const bdx = dx * 0.35;
    const bdy = dy * 0.2;
    const rot = dx * 0.6;
    track.setAttribute('transform', `translate(${bdx} ${bdy}) rotate(${rot} 11 12)`);
    lastEyeDx = dx; lastEyeDy = dy;
  }
}
updateEyeTracking();

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
applyState('idle');
log('🐾 Pet initialized — drag me, click me, or leave me alone!');
</script>
