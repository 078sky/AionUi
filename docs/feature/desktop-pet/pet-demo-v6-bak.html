<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AionUi Pet — animated v6</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a1b2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 32px;
    font-family: system-ui, sans-serif;
    color: #fff;
  }
  h1 { font-size: 12px; opacity: 0.4; letter-spacing: 3px; text-transform: uppercase; }
  .row { display: flex; gap: 56px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item span { font-size: 11px; opacity: 0.4; letter-spacing: 2px; text-transform: uppercase; }
  .pet { width: 160px; height: 160px; }
</style>
</head>
<body>

<h1>AionUi Pet · animated v6</h1>

<div class="row">

  <!-- ═══════════════════════════════════════════════
       IDLE — breathe + blink
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .idle-body {
            transform-origin: 11px 18px;
            animation: idle-breathe 3.2s ease-in-out infinite;
          }
          .idle-eye {
            transform-origin: 11px 11px;
            animation: idle-blink 4s ease-in-out infinite;
          }
          .idle-shadow {
            transform-origin: 11px 22.5px;
            animation: idle-shadow 3.2s ease-in-out infinite;
          }
          @keyframes idle-breathe {
            0%,100% { transform: scaleY(1) translateY(0); }
            50%     { transform: scaleY(0.97) translateY(0.3px); }
          }
          @keyframes idle-blink {
            0%,8%,100% { transform: scaleY(1); }
            4%          { transform: scaleY(0.08); }
          }
          @keyframes idle-shadow {
            0%,100% { transform: scaleX(1); opacity: 0.35; }
            50%     { transform: scaleX(0.96); opacity: 0.28; }
          }
        </style>
      </defs>
      <!-- shadow -->
      <ellipse class="idle-shadow" cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0"/>
      <!-- main body group -->
      <g class="idle-body">
        <!-- ears -->
        <rect x="2" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7" transform="rotate(45 3.5 10.5)"/>
        <rect x="17" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7" transform="rotate(45 18.5 10.5)"/>
        <!-- body -->
        <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
        <!-- hat -->
        <polygon points="11,1 15,7 7,7" fill="#D95226"/>
        <!-- hat highlight -->
        <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
        <!-- eye -->
        <g class="idle-eye">
          <rect x="10" y="10" width="2" height="2" fill="#111827"/>
        </g>
        <!-- smile -->
        <path d="M8 13.5 Q11 16.5 14 13.5" stroke="#111827" stroke-width="1" stroke-linecap="round" fill="none"/>
      </g>
    </svg>
    <span>idle</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       THINKING — 侧脸 + 像素泡泡 + 嘟嘴 + 光点
       viewBox: 主体在(5~17, 6~18)，四周留充足边距
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .think-body {
            transform-origin: 11px 12px;
            animation: think-breathe 3.2s ease-in-out infinite;
          }
          .think-bubble { animation: think-bubble-float 3s ease-in-out infinite; }
          .tpx1 { animation: think-dot 1.8s infinite 0s; }
          .tpx2 { animation: think-dot 1.8s infinite 0.35s; }
          .tpx3 { animation: think-dot 1.8s infinite 0.7s; }
          /* 飘动光点 */
          .tgl1 { animation: think-glow 3s ease-in-out infinite 0s; opacity:0; }
          .tgl2 { animation: think-glow 3s ease-in-out infinite 1s; opacity:0; }
          .tgl3 { animation: think-glow 3s ease-in-out infinite 2s; opacity:0; }
          @keyframes think-breathe {
            0%,100% { transform: translateY(0); }
            50%     { transform: translateY(0.4px); }
          }
          @keyframes think-bubble-float {
            0%,100% { transform: translateY(0); }
            50%     { transform: translateY(-0.5px); }
          }
          @keyframes think-dot {
            0%,15%  { opacity: 0; }
            30%,75% { opacity: 1; }
            100%    { opacity: 0; }
          }
          @keyframes think-glow {
            0%   { opacity:0; transform: translate(0,0); }
            20%  { opacity:0.9; }
            100% { opacity:0; transform: translate(2px,-6px); }
          }
        </style>
      </defs>

      <!-- 像素对话泡泡，坐标完全对应设计稿 -->
      <g class="think-bubble">
        <!-- 外框像素风：用3层rect模拟圆角 -->
        <rect x="-13" y="-12" width="13" height="1"  fill="white"/>
        <rect x="-14" y="-11" width="15" height="7"  fill="white"/>
        <rect x="-13" y="-4"  width="13" height="1"  fill="white"/>
        <!-- 尾巴 -->
        <rect x="-8"  y="-3"  width="3"  height="1"  fill="white"/>
        <rect x="-7"  y="-2"  width="2"  height="1"  fill="white"/>
        <rect x="-7"  y="-1"  width="1"  height="1"  fill="white"/>
        <!-- 三个像素加载点 -->
        <rect class="tpx1" x="-12" y="-9" width="2" height="2" fill="#605AFF"/>
        <rect class="tpx2" x="-8"  y="-9" width="2" height="2" fill="#605AFF"/>
        <rect class="tpx3" x="-4"  y="-9" width="2" height="2" fill="#605AFF"/>
      </g>

      <!-- 飘动光点 -->
      <rect class="tgl1" x="20" y="8"  width="1.2" height="1.2" rx="0.2" fill="#94BDFF"/>
      <rect class="tgl2" x="22" y="4"  width="1"   height="1"   rx="0.2" fill="#94BDFF"/>
      <rect class="tgl3" x="3"  y="9"  width="1"   height="1"   rx="0.2" fill="#94BDFF"/>

      <!-- shadow -->
      <ellipse cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0" opacity="0.35"/>

      <g class="think-body">
        <!-- 左小圆手，贴身体左侧 -->
        <circle cx="4.5" cy="15" r="2.2" fill="#8891b8" opacity="0.7"/>
        <!-- 右圆角方手，贴身体右侧 -->
        <rect x="17" y="13" width="3" height="3" rx="1.5" fill="#B6BDD6"/>
        <!-- 身体 -->
        <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
        <!-- 帽子 — 偏右侧，配合侧脸 -->
        <polygon points="13,2 17,8 9,8" fill="#D95226" fill-opacity="0.9"/>
        <rect x="12" y="3" width="1" height="1" fill="#e8714a"/>
        <!-- 白色眼睛块（设计稿是白色！偏左上） -->
        <rect x="8" y="8" width="2" height="3" fill="white"/>
        <!-- 嘟嘴：小圆点 + 弯弧，还原设计稿 -->
        <rect x="10" y="14" width="2" height="2" rx="1" fill="#111827"/>
        <path d="M10 15.5 C9 15.5 8.5 17.5 10 18 L10.5 18" stroke="#111827" stroke-width="0.8" stroke-linecap="round" fill="none"/>
      </g>
    </svg>
    <span>thinking</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       WORKING — fast bounce + arms wave
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .work-body {
            transform-origin: 11px 18px;
            animation: work-bounce 0.9s ease-in-out infinite;
          }
          .work-shadow {
            transform-origin: 11px 22.5px;
            animation: work-shadow 0.9s ease-in-out infinite;
          }
          .work-arm-l {
            transform-origin: 5px 12px;
            animation: work-arm-l 0.9s ease-in-out infinite;
          }
          .work-arm-r {
            transform-origin: 17px 12px;
            animation: work-arm-r 0.9s ease-in-out infinite;
          }
          @keyframes work-bounce {
            0%,100% { transform: translateY(0) scaleY(1); }
            15%     { transform: translateY(0) scaleY(0.9); }
            40%     { transform: translateY(-3px) scaleY(1.04); }
            55%     { transform: translateY(-3.5px) scaleY(1); }
            70%     { transform: translateY(-3px) scaleY(1.04); }
            85%     { transform: translateY(0) scaleY(0.9); }
          }
          @keyframes work-shadow {
            0%,100% { transform: scaleX(1); opacity: 0.35; }
            40%,55% { transform: scaleX(0.6); opacity: 0.15; }
          }
          @keyframes work-arm-l {
            0%,100% { transform: rotate(0deg); }
            40%     { transform: rotate(-30deg); }
          }
          @keyframes work-arm-r {
            0%,100% { transform: rotate(0deg); }
            40%     { transform: rotate(30deg); }
          }
        </style>
      </defs>
      <ellipse class="work-shadow" cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0"/>
      <g class="work-body">
        <!-- arms separate so they can rotate -->
        <g class="work-arm-l">
          <rect x="2" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.8" transform="rotate(45 3.5 10.5)"/>
        </g>
        <g class="work-arm-r">
          <rect x="17" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.8" transform="rotate(45 18.5 10.5)"/>
        </g>
        <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
        <polygon points="11,1 15,7 7,7" fill="#D95226"/>
        <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
        <!-- excited eyes — slightly raised -->
        <rect x="9.5" y="9.5" width="1.5" height="2" fill="#111827"/>
        <rect x="11.5" y="9.5" width="0.5" height="2" fill="#111827"/>
        <!-- big smile -->
        <path d="M8 13 Q11 17 14 13" stroke="#111827" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      </g>
    </svg>
    <span>working</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       HAPPY — big jump + sparkles + >w< face
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .happy-body {
            transform-origin: 11px 18px;
            animation: happy-jump 1s ease-in-out infinite;
          }
          .happy-shadow {
            transform-origin: 11px 22.5px;
            animation: happy-shadow 1s ease-in-out infinite;
          }
          .happy-arm-l {
            transform-origin: 5px 12px;
            animation: happy-arm-l 0.5s ease-in-out infinite alternate;
          }
          .happy-arm-r {
            transform-origin: 17px 12px;
            animation: happy-arm-r 0.5s ease-in-out infinite alternate;
          }
          .spark { opacity: 0; }
          .sp1 { animation: spark-flash 1.5s step-end infinite; animation-delay: 0s; }
          .sp2 { animation: spark-flash 1.5s step-end infinite; animation-delay: 0.5s; }
          .sp3 { animation: spark-flash 1.5s step-end infinite; animation-delay: 1s; }
          @keyframes happy-jump {
            0%,100% { transform: translateY(0) scaleY(1); }
            12%     { transform: translateY(0) scaleY(0.88); }
            30%     { transform: translateY(-5px) scaleY(1.06); }
            50%     { transform: translateY(-6px) scaleY(1); }
            70%     { transform: translateY(-5px) scaleY(1.06); }
            88%     { transform: translateY(0) scaleY(0.88); }
          }
          @keyframes happy-shadow {
            0%,100% { transform: scaleX(1); opacity: 0.35; }
            30%,70% { transform: scaleX(0.5); opacity: 0.1; }
          }
          @keyframes happy-arm-l {
            from { transform: rotate(-40deg); }
            to   { transform: rotate(-70deg); }
          }
          @keyframes happy-arm-r {
            from { transform: rotate(40deg); }
            to   { transform: rotate(70deg); }
          }
          @keyframes spark-flash {
            0%  { opacity: 0; }
            10% { opacity: 1; }
            30% { opacity: 0; }
            100%{ opacity: 0; }
          }
        </style>
      </defs>
      <!-- sparkles -->
      <g class="spark sp1" fill="#FFD700">
        <rect x="1" y="4" width="1" height="1"/>
        <rect x="0" y="5" width="3" height="0.5"/>
        <rect x="1" y="6" width="1" height="1"/>
      </g>
      <g class="spark sp2" fill="#FF9F3F">
        <rect x="19" y="2" width="1" height="1"/>
        <rect x="18" y="3" width="3" height="0.5"/>
        <rect x="19" y="4" width="1" height="1"/>
      </g>
      <g class="spark sp3" fill="#FFF59D">
        <rect x="20" y="11" width="1" height="1"/>
        <rect x="19" y="12" width="3" height="0.5"/>
        <rect x="20" y="13" width="1" height="1"/>
      </g>
      <ellipse class="happy-shadow" cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0"/>
      <g class="happy-body">
        <g class="happy-arm-l">
          <rect x="2" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.8" transform="rotate(45 3.5 10.5)"/>
        </g>
        <g class="happy-arm-r">
          <rect x="17" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.8" transform="rotate(45 18.5 10.5)"/>
        </g>
        <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
        <polygon points="11,1 15,7 7,7" fill="#D95226"/>
        <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
        <!-- >w< arc eyes -->
        <path d="M9 10.5 Q10 9.5 11 10.5" stroke="#111827" stroke-width="1" stroke-linecap="round" fill="none"/>
        <path d="M11 10.5 Q12 9.5 13 10.5" stroke="#111827" stroke-width="1" stroke-linecap="round" fill="none"/>
        <!-- blush -->
        <rect x="7" y="12" width="2" height="1" rx="0.5" fill="#e08090" opacity="0.45"/>
        <rect x="13" y="12" width="2" height="1" rx="0.5" fill="#e08090" opacity="0.45"/>
        <!-- big smile -->
        <path d="M8 13 Q11 17.5 14 13" stroke="#111827" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      </g>
    </svg>
    <span>happy</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       SLEEPING — slow breathe + zzz float
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .sleep-body {
            transform-origin: 11px 18px;
            animation: sleep-breathe 4.5s ease-in-out infinite;
          }
          .sleep-shadow {
            transform-origin: 11px 22.5px;
            animation: sleep-shadow 4.5s ease-in-out infinite;
          }
          .z1 { animation: zzz-1 5s ease-in-out infinite; animation-delay: 0s; }
          .z2 { animation: zzz-2 5s ease-in-out infinite; animation-delay: 1.6s; }
          .z3 { animation: zzz-3 5s ease-in-out infinite; animation-delay: 3.2s; }
          @keyframes sleep-breathe {
            0%,100% { transform: scaleY(1); }
            35%,45% { transform: scaleY(1.04); }
          }
          @keyframes sleep-shadow {
            0%,100% { transform: scaleX(1); opacity: 0.28; }
            35%,45% { transform: scaleX(1.04); opacity: 0.35; }
          }
          @keyframes zzz-1 {
            0%   { opacity:0; transform: translate(12px,8px) scale(0.5); }
            15%  { opacity:0.9; }
            80%  { opacity:0.6; }
            100% { opacity:0; transform: translate(16px,2px) scale(0.9); }
          }
          @keyframes zzz-2 {
            0%   { opacity:0; transform: translate(13px,7px) scale(0.4); }
            15%  { opacity:0.9; }
            80%  { opacity:0.6; }
            100% { opacity:0; transform: translate(18px,1px) scale(0.8); }
          }
          @keyframes zzz-3 {
            0%   { opacity:0; transform: translate(11px,9px) scale(0.35); }
            15%  { opacity:0.9; }
            80%  { opacity:0.6; }
            100% { opacity:0; transform: translate(15px,3px) scale(0.7); }
          }
        </style>
        <!-- pixel Z shape -->
        <g id="pz">
          <rect x="0" y="0" width="3" height="0.7"/>
          <rect x="1.6" y="0.7" width="0.8" height="0.8"/>
          <rect x="0.7" y="1.5" width="0.8" height="0.8"/>
          <rect x="0" y="2.3" width="3" height="0.7"/>
        </g>
      </defs>
      <!-- floating zzz -->
      <use href="#pz" class="z1" fill="#8891b8"/>
      <use href="#pz" class="z2" fill="#a0a8c8"/>
      <use href="#pz" class="z3" fill="#c0c8e0"/>
      <ellipse class="sleep-shadow" cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0"/>
      <g class="sleep-body">
        <!-- ears drooped slightly -->
        <rect x="2" y="10" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.5" transform="rotate(45 3.5 11.5)"/>
        <rect x="17" y="10" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.5" transform="rotate(45 18.5 11.5)"/>
        <rect x="5" y="6" width="12" height="12" rx="6" fill="#8890b5"/>
        <!-- hat tilted for sleeping -->
        <polygon points="11,2 14.5,7 7.5,7" fill="#b84020" transform="rotate(-12 11 5)"/>
        <!-- closed eyes — dash lines -->
        <line x1="9" y1="11" x2="11" y2="11" stroke="#111827" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="11" y1="11" x2="13" y2="11" stroke="#111827" stroke-width="0.8" stroke-linecap="round"/>
        <!-- tiny smile (peaceful) -->
        <path d="M9 13.5 Q11 15 13 13.5" stroke="#111827" stroke-width="0.8" stroke-linecap="round" fill="none"/>
      </g>
    </svg>
    <span>sleeping</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       ERROR — shake + X eyes + hat flying
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .err-body {
            animation: err-shake 0.4s ease-in-out infinite;
          }
          .err-hat {
            transform-origin: 11px 4px;
            animation: err-hat-fly 0.4s ease-in-out infinite;
          }
          @keyframes err-shake {
            0%,100% { transform: translateX(0); }
            20%     { transform: translateX(-1.5px) rotate(-2deg); }
            40%     { transform: translateX(1.5px) rotate(2deg); }
            60%     { transform: translateX(-1px) rotate(-1.5deg); }
            80%     { transform: translateX(1px) rotate(1.5deg); }
          }
          @keyframes err-hat-fly {
            0%,100% { transform: translateX(0) translateY(0) rotate(0deg); }
            25%     { transform: translateX(2px) translateY(-3px) rotate(15deg); }
            75%     { transform: translateX(-1px) translateY(-2px) rotate(-8deg); }
          }
        </style>
      </defs>
      <ellipse cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0" opacity="0.35"/>
      <!-- hat flying separately -->
      <g class="err-hat">
        <polygon points="11,1 15,7 7,7" fill="#D95226"/>
        <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
      </g>
      <g class="err-body">
        <rect x="2" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7" transform="rotate(45 3.5 10.5)"/>
        <rect x="17" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7" transform="rotate(45 18.5 10.5)"/>
        <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
        <!-- X eyes -->
        <line x1="9" y1="9.5" x2="11" y2="11.5" stroke="#111827" stroke-width="1" stroke-linecap="round"/>
        <line x1="11" y1="9.5" x2="9" y2="11.5" stroke="#111827" stroke-width="1" stroke-linecap="round"/>
        <line x1="11" y1="9.5" x2="13" y2="11.5" stroke="#111827" stroke-width="1" stroke-linecap="round"/>
        <line x1="13" y1="9.5" x2="11" y2="11.5" stroke="#111827" stroke-width="1" stroke-linecap="round"/>
        <!-- worried mouth -->
        <path d="M8.5 14.5 Q11 12.5 13.5 14.5" stroke="#111827" stroke-width="1" stroke-linecap="round" fill="none"/>
      </g>
    </svg>
    <span>error</span>
  </div>


  <!-- ═══════════════════════════════════════════════
       NOTIFICATION — 惊跳 + 感叹号 + 衰减跳动
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .notif-body {
            transform-origin: 11px 18px;
            animation: notif-jump 3.5s ease-in-out infinite;
          }
          .notif-shadow {
            transform-origin: 11px 22.5px;
            animation: notif-shadow 3.5s ease-in-out infinite;
          }
          .notif-arm-l {
            transform-origin: 5px 12px;
            animation: notif-arm-l 3.5s ease-in-out infinite;
          }
          .notif-arm-r {
            transform-origin: 17px 12px;
            animation: notif-arm-r 3.5s ease-in-out infinite;
          }
          .notif-eye {
            transform-origin: 11px 11px;
            animation: notif-eye 3.5s ease-in-out infinite;
          }
          .notif-alert {
            transform-origin: 18px 2px;
            animation: notif-alert 3.5s ease-in-out infinite;
            opacity: 0;
          }
          @keyframes notif-jump {
            0%,100% { transform: translateY(0) scaleY(1); }
            8%      { transform: translateY(0) scaleY(0.92); }
            18%     { transform: translateY(-9px) scaleY(1.05); }
            26%     { transform: translateY(0) scaleY(0.92); }
            34%     { transform: translateY(-6px) scaleY(1.03); }
            40%     { transform: translateY(0) scaleY(0.94); }
            47%     { transform: translateY(-3px) scaleY(1.02); }
            53%     { transform: translateY(0) scaleY(0.97); }
            58%     { transform: translateY(-1px) scaleY(1.01); }
            63%,100%{ transform: translateY(0) scaleY(1); }
          }
          @keyframes notif-shadow {
            0%,100% { transform: scaleX(1); opacity: 0.35; }
            18%     { transform: scaleX(0.45); opacity: 0.1; }
            26%     { transform: scaleX(1.05); opacity: 0.4; }
            34%     { transform: scaleX(0.6); opacity: 0.18; }
            40%     { transform: scaleX(1); opacity: 0.35; }
            47%     { transform: scaleX(0.75); opacity: 0.25; }
          }
          @keyframes notif-arm-l {
            0%,100% { transform: rotate(0deg); }
            18%     { transform: rotate(140deg); }
            34%     { transform: rotate(100deg); }
            47%     { transform: rotate(60deg); }
            63%     { transform: rotate(0deg); }
          }
          @keyframes notif-arm-r {
            0%,100% { transform: rotate(0deg); }
            18%     { transform: rotate(-140deg); }
            34%     { transform: rotate(-100deg); }
            47%     { transform: rotate(-60deg); }
            63%     { transform: rotate(0deg); }
          }
          @keyframes notif-eye {
            0%,6%,100% { transform: translate(0,0) scaleY(1); }
            3%          { transform: translate(2px,0) scaleY(0.1); }
            9%          { transform: translate(2px,0) scaleY(1); }
            63%         { transform: translate(0,0) scaleY(1); }
          }
          @keyframes notif-alert {
            0%    { opacity: 0; transform: scale(0.3); }
            5%    { opacity: 1; transform: scale(1.3); }
            10%   { opacity: 1; transform: scale(1); }
            55%   { opacity: 1; transform: scale(1); }
            63%   { opacity: 0; transform: scale(0.5); }
            100%  { opacity: 0; }
          }
        </style>
      </defs>
      <!-- exclamation mark -->
      <g class="notif-alert" fill="#FF6B35">
        <rect x="17" y="-8" width="2" height="5" rx="1"/>
        <rect x="17" y="-2" width="2" height="2" rx="1"/>
      </g>
      <ellipse class="notif-shadow" cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0"/>
      <g class="notif-body">
        <g class="notif-arm-l">
          <rect x="2" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.8" transform="rotate(45 3.5 10.5)"/>
        </g>
        <g class="notif-arm-r">
          <rect x="17" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.8" transform="rotate(45 18.5 10.5)"/>
        </g>
        <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
        <polygon points="11,1 15,7 7,7" fill="#D95226"/>
        <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
        <g class="notif-eye">
          <rect x="10" y="10" width="2" height="2" fill="#111827"/>
        </g>
        <path d="M8 13.5 Q11 16.5 14 13.5" stroke="#111827" stroke-width="1" stroke-linecap="round" fill="none"/>
      </g>
    </svg>
    <span>notification</span>
  </div>

  <!-- ═══════════════════════════════════════════════
       WAKING — 从睡眠站起来（一次性过渡，循环演示）
  ══════════════════════════════════════════════════ -->
  <div class="item">
    <svg class="pet" viewBox="-18 -18 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .wake-body {
            transform-origin: 11px 18px;
            animation: wake-rise 2s ease-out infinite;
          }
          .wake-eye {
            transform-origin: 11px 11px;
            animation: wake-eye 2s ease-out infinite;
          }
          .wake-hat {
            transform-origin: 11px 4px;
            animation: wake-hat 2s ease-out infinite;
          }
          .wake-shadow {
            transform-origin: 11px 22.5px;
            animation: wake-shadow 2s ease-out infinite;
          }
          @keyframes wake-rise {
            0%    { transform: translateY(3px) scaleY(0.88) scaleX(1.08); }
            8%    { transform: translateY(2px) scaleY(0.9) scaleX(1.06); }
            25%   { transform: translateY(-3px) scaleY(1.1) scaleX(0.94); }
            45%   { transform: translateY(-1px) scaleY(0.97) scaleX(1.02); }
            58%   { transform: translateY(0.5px) scaleY(1.02) scaleX(0.99); }
            70%,100% { transform: translateY(0) scaleY(1) scaleX(1); }
          }
          @keyframes wake-eye {
            0%,12%  { transform: scaleY(0.08); }
            22%     { transform: scaleY(1.3); }
            35%,100%{ transform: scaleY(1); }
          }
          @keyframes wake-hat {
            0%    { transform: rotate(-14deg) translateY(1px); }
            40%   { transform: rotate(4deg); }
            60%   { transform: rotate(-2deg); }
            75%,100%{ transform: rotate(0deg); }
          }
          @keyframes wake-shadow {
            0%    { transform: scaleX(1.06); opacity: 0.38; }
            25%   { transform: scaleX(0.82); opacity: 0.22; }
            70%,100%{ transform: scaleX(1); opacity: 0.35; }
          }
        </style>
      </defs>
      <ellipse class="wake-shadow" cx="11" cy="22.5" rx="4" ry="0.6" fill="#c0c0c0"/>
      <g class="wake-body">
        <rect x="2" y="10" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.6" transform="rotate(45 3.5 11.5)"/>
        <rect x="17" y="10" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.6" transform="rotate(45 18.5 11.5)"/>
        <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
        <g class="wake-hat">
          <polygon points="11,1 15,7 7,7" fill="#D95226"/>
          <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
        </g>
        <g class="wake-eye">
          <rect x="10" y="10" width="2" height="2" fill="#111827"/>
        </g>
        <path d="M8 13.5 Q11 16.5 14 13.5" stroke="#111827" stroke-width="1" stroke-linecap="round" fill="none"/>
      </g>
    </svg>
    <span>waking</span>
  </div>

</div>
