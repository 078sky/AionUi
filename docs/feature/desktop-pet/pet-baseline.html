<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>AionUi Pet — baseline v3 SVG</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #1a1b2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 40px;
    font-family: system-ui, sans-serif;
    color: #fff;
  }
  h1 { font-size: 13px; opacity: 0.4; letter-spacing: 3px; text-transform: uppercase; }
  .row { display: flex; gap: 48px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .item span { font-size: 11px; opacity: 0.4; letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>

<h1>AionUi Pet · baseline v3</h1>

<div class="row">

  <!-- 22px — icon size -->
  <div class="item">
    <svg width="22" height="24" viewBox="0 0 22 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- shadow -->
      <rect x="7" y="22" width="8" height="1" rx="0.5" fill="#c0c0c0" opacity="0.4"/>
      <!-- ears -->
      <rect x="2" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7"
            transform="rotate(45 3.5 10.5)"/>
      <rect x="17" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7"
            transform="rotate(45 18.5 10.5)"/>
      <!-- body -->
      <rect x="5" y="6" width="12" height="12" rx="2" fill="#97A0C5"/>
      <!-- hat -->
      <polygon points="11,1 15,7 7,7" fill="#D95226"/>
      <!-- hat highlight pixel -->
      <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
      <!-- eye -->
      <rect x="10" y="10" width="2" height="2" fill="#111827"/>
      <!-- smile -->
      <path d="M8 13.5 Q11 16.5 14 13.5" stroke="#111827" stroke-width="1"
            stroke-linecap="round" fill="none"/>
    </svg>
    <span>22px</span>
  </div>

  <!-- 44px -->
  <div class="item">
    <svg width="44" height="48" viewBox="0 0 22 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="7" y="22" width="8" height="1" rx="0.5" fill="#c0c0c0" opacity="0.4"/>
      <rect x="2" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7"
            transform="rotate(45 3.5 10.5)"/>
      <rect x="17" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7"
            transform="rotate(45 18.5 10.5)"/>
      <rect x="5" y="6" width="12" height="12" rx="2" fill="#97A0C5"/>
      <polygon points="11,1 15,7 7,7" fill="#D95226"/>
      <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
      <rect x="10" y="10" width="2" height="2" fill="#111827"/>
      <path d="M8 13.5 Q11 16.5 14 13.5" stroke="#111827" stroke-width="1"
            stroke-linecap="round" fill="none"/>
    </svg>
    <span>44px</span>
  </div>

  <!-- 88px -->
  <div class="item">
    <svg width="88" height="96" viewBox="0 0 22 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="7" y="22" width="8" height="1" rx="0.5" fill="#c0c0c0" opacity="0.4"/>
      <rect x="2" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7"
            transform="rotate(45 3.5 10.5)"/>
      <rect x="17" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7"
            transform="rotate(45 18.5 10.5)"/>
      <rect x="5" y="6" width="12" height="12" rx="2" fill="#97A0C5"/>
      <polygon points="11,1 15,7 7,7" fill="#D95226"/>
      <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
      <rect x="10" y="10" width="2" height="2" fill="#111827"/>
      <path d="M8 13.5 Q11 16.5 14 13.5" stroke="#111827" stroke-width="1"
            stroke-linecap="round" fill="none"/>
    </svg>
    <span>88px</span>
  </div>

  <!-- 176px — app widget size -->
  <div class="item">
    <svg width="176" height="192" viewBox="0 0 22 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="7" y="22" width="8" height="1" rx="0.5" fill="#c0c0c0" opacity="0.4"/>
      <rect x="2" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7"
            transform="rotate(45 3.5 10.5)"/>
      <rect x="17" y="9" width="3" height="3" rx="0.5" fill="#8891b8" opacity="0.7"
            transform="rotate(45 18.5 10.5)"/>
      <rect x="5" y="6" width="12" height="12" rx="2" fill="#97A0C5"/>
      <polygon points="11,1 15,7 7,7" fill="#D95226"/>
      <rect x="10" y="2" width="1" height="1" fill="#e8714a"/>
      <rect x="10" y="10" width="2" height="2" fill="#111827"/>
      <path d="M8 13.5 Q11 16.5 14 13.5" stroke="#111827" stroke-width="1"
            stroke-linecap="round" fill="none"/>
    </svg>
    <span>176px</span>
  </div>

  <!-- original ref -->
  <div class="item">
    <svg width="176" height="192" viewBox="0 0 22 24" fill="none" xmlns="http://www.w3.org/2000/svg"
         style="opacity:0.5">
      <rect x="5" y="6" width="12" height="12" rx="6" fill="#97A0C5"/>
      <rect x="10" y="10" width="2" height="2" rx="1" fill="black"/>
      <path d="M8 13C9.18123 15.5593 12.8188 15.5593 14 13" stroke="black" stroke-linecap="round"/>
      <path d="M11 1L14.4641 7H7.5359L11 1Z" fill="#D95226" fill-opacity="0.8"/>
      <rect x="4.11641" y="10" width="3" height="3" transform="rotate(44.8676 4.11641 10)"
            fill="#97A0C5" fill-opacity="0.7"/>
      <rect x="18.1164" y="10" width="3" height="3" transform="rotate(44.8676 18.1164 10)"
            fill="#97A0C5" fill-opacity="0.7"/>
      <rect x="7" y="20" width="8" height="1" fill="#D9D9D9"/>
    </svg>
    <span>original (ref)</span>
  </div>

</div>

</body>
</html>
