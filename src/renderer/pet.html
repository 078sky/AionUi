<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AionUi Pet</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        user-select: none;
      }
      #pet {
        width: 100%;
        height: 100%;
        pointer-events: none;
        filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.15));
      }
    </style>
  </head>
  <body>
    <object id="pet" type="image/svg+xml" data="./pet-states/idle.svg"></object>
    <script type="module" src="./pet-renderer.ts"></script>
  </body>
</html>
